<section class="mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h3 class="fw-bold">
                🎨 Artwork Center
            </h3>

            <p class="text-muted mb-0">
                Customer logos and artwork awaiting production.
            </p>

        </div>

        <span class="dash-pill">
            {{ logo_count }} Logos
        </span>

    </div>

    <div class="row g-4">

        {% for quote in quotes_with_logos %}

        <div class="col-xl-3 col-lg-4 col-md-6">

            <div class="dash-card artwork-card">

                <div class="artwork-preview">

                    <img
                        src="{{ quote.logo.url }}"
                        alt="{{ quote.company }}">

                </div>

                <h5 class="mt-3">

                    {{ quote.company|default:quote.name }}

                </h5>

                <small class="text-muted">

                    {{ quote.product_interest }}

                </small>

                <div class="mt-3 d-grid gap-2">

                    <a
                        href="{{ quote.logo.url }}"
                        target="_blank"
                        class="btn btn-outline-primary">

                        Preview

                    </a>

                    <a
                        href="/admin/brands/quoterequest/{{ quote.id }}/change/"
                        class="btn btn-primary">

                        Open Quote

                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">

            <div class="dash-card text-center py-5">

                <h4>No artwork uploaded yet.</h4>

            </div>

        </div>

        {% endfor %}

    </div>

</section>
