{% load static %}



<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KaleidoBrands Dashboard{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'dashboard/css/dashboard.css' %}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>

<body>

<div class="dashboard-app">

    {% include "dashboard/partials/navbar.html" %}

    <main class="dashboard-main">
        {% block content %}{% endblock %}
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'dashboard/js/darkmode.js' %}"></script>
<script src="{% static 'dashboard/js/counters.js' %}"></script>
<script src="{% static 'dashboard/js/dashboard.js' %}"></script>
<script src="{% static 'dashboard/js/pipeline.js' %}"></script>
<script src="{% static 'dashboard/js/live_stats.js' %}"></script>
<script src="{% static 'dashboard/js/charts.js' %}"></script>
<script src="{% static 'dashboard/js/kanban.js' %}"></script>
{% block extra_scripts %}{% endblock %}

</body>
</html>
